add_newline = false

format = """\
$username\
$hostname\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_status\
$nix_shell\
$golang\
$lua\
$nodejs\
$python\
$rust\
$dotnet\
$c\
$solidity\
$terraform\
$kubernetes\
$helm\
$cmd_duration\
$line_break\
$character\
"""

[username]
show_always = true
format = '[$user](bold yellow)'

[hostname]
ssh_only = false
format = '[@$hostname](bold yellow) '

[directory]
style = 'bold cyan'
truncation_length = 1
truncate_to_repo = false
fish_style_pwd_dir_length = 1

[character]
success_symbol = '[>](bold green)'
error_symbol = '[>](bold red)'

[git_branch]
format = 'on [$branch(:$remote_branch)]($style) '
symbol = ''

[git_commit]
tag_symbol = ''

[git_status]
format = '[$all_status$ahead_behind]($style)'
ahead = '[↑${count}](green) '
diverged = '[↑${ahead_count}↓${behind_count}](red) '
behind = '[↓${count}](green) '
modified = '[!${count}](yellow) '
untracked = '[?${count}](blue) '
staged = '[+${count}](yellow) '
stashed = '[*${count}](green) '
deleted = '[x${count}](red) '
renamed = '[r${count}](yellow) '

[nix_shell]
disabled = false
format = '[nix](bold blue) '

[golang]
symbol = 'go-'

[lua]
symbol = 'lua-'

[nodejs]
symbol = 'node-'

[python]
symbol = 'py-'
format = '[${symbol}(${version})]($style) '
python_binary = 'python'
pyenv_version_name = false
detect_files = ['.python-version']

[rust]
symbol = 'rs-'

[c]
symbol = 'c-'

[dotnet]
symbol = 'net-'

[solidity]
symbol = 'sol-'

[terraform]
symbol = 'tf-'

[kubernetes]
disabled = false
symbol = 'k8s-'

[helm]
symbol = 'helm-'

[cmd_duration]
format = '[took $duration]($style) '
